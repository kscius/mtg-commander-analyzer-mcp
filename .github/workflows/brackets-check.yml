# Monthly hard-check of Wizards Commander Brackets policy phrases.
# Uses --skip-moxfield to avoid Playwright/Cloudflare flakiness; Moxfield remains soft/manual.
# Cadence matches data/bracket-official-sources.json maintenance.recommendedCadenceDays (30).

name: Brackets official sources

on:
  schedule:
    # 1st of each month, 08:00 UTC
    - cron: '0 8 1 * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  brackets-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Wizards bracket policy phrases (skip Moxfield)
        run: npm run brackets:check-official:quick
