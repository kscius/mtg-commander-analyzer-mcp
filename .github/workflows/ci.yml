name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          # Vitest 3 + Vite ESM config fails on Node 18 in CI (ERR_REQUIRE_ESM)
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup cards database
        run: bash scripts/ci-setup-db.sh

      - name: Typecheck (build)
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Golden deck analyze regression
        run: npm run test:golden

      - name: Template build benchmark (offline EDHREC)
        run: npm run benchmark:decks
