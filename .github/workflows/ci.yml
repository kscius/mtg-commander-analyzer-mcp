name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded PR runs; let push-to-main finish (every main commit should validate).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    # Bound hung Scryfall download / mcp-smoke / vitest (default GHA job timeout is 360m).
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v7
        with:
          # Vitest 3 + Vite ESM config fails on Node 18 in CI (ERR_REQUIRE_ESM)
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail on high/critical advisories in the lockfile (direct + transitive).
      # Run after npm ci so CI matches production install resolution.
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

      - name: Setup cards database
        run: bash scripts/ci-setup-db.sh

      - name: Typecheck (build)
        run: npm run build

      - name: MCP stdio smoke test
        run: npm run test:mcp-smoke

      - name: Unit tests
        run: npm test

      - name: Golden deck analyze regression
        run: npm run test:golden

      - name: Template build benchmark (offline EDHREC)
        run: npm run benchmark:decks
