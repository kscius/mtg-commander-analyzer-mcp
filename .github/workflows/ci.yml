name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Scryfall oracle cards
        run: |
          mkdir -p data
          ORACLE_URL=$(curl -fsSL "https://api.scryfall.com/bulk-data/oracle-cards" | grep -o '"download_uri":"[^"]*' | cut -d'"' -f4)
          test -n "$ORACLE_URL"
          curl -fsSL -o data/oracle-cards.json "$ORACLE_URL"

      - name: Build cards database
        run: |
          npm run db:create
          npm run db:import

      - name: Typecheck (build)
        run: npm run build

      - name: Unit tests
        run: npm test

  golden-deck-regression:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build cards database
        run: |
          npm run db:create
          npm run db:import

      - name: Golden deck analyze regression
        run: npm run test:golden

  benchmark-decks:
    runs-on: ubuntu-latest
    needs: golden-deck-regression

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build cards database
        run: |
          npm run db:create
          npm run db:import

      - name: Template build benchmark (offline EDHREC)
        run: npm run benchmark:decks
